<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>

    <!-- pattern working : [A-Za-z0-9] -->
    
    <form action="">
        <div>
            <!-- <input type="text" pattern="[A-Za-z]+" placeholder="Enter your name" required> -->
             <input type="text" pattern="[A-Za-z]{3,9}" placeholder="Enter your name" required>
        </div>
        <div>
            <input type="text" pattern="[A-Za-z]{3,7}" placeholder="Enter your Surame" required>
        </div>
        <div>
            <!-- shubhamjadav45@gmail.com -->
            <input type="email" placeholder="Enter your Email" required>
        </div>
        <div>
            <!-- <input type="tel" pattern="[0-9]{10}" placeholder="Enter your Phone" required> -->
            <input type="tel" pattern="[6-9][0-9]{9}" maxlength="10" placeholder="Enter your Phone" required>
        </div>
        <div>
            <input type="password" pattern="[A-Z][A-Za-z0-9]{3,10}" placeholder="Enter your Password" required>
        </div>
        <div>
            <input type="submit">
        </div>
    </form>

</body>
</html>
